pretrain: "./models/vit-16-32f.pt"   # pre-trained CLIP ViT-B/16 weights
resume:
seed: 1024
data:
    dataset: MockDataset
    modality: RGB
    num_frames: 32
    seg_length: 1
    split: 1
    batch_size: 1    # increase if GPU memory allows (4+ recommended for real data)
    workers: 4
    gpus: 1
    num_classes: 4
    index_bias: 1
    input_size: 224
    n_split: 1
    max_act: 4
    # Paths read by the SegDataset loader (else branch)
    root:      '../../data/MockDataset'
    frame_dir: '../../data/MockDataset/frames'
    label_dir: '../../data/MockDataset/annotations'
    class_dir: '../../data/MockDataset/mapping.json'
    save_dir:  '../../data/MockDataset/brp_raw'
    randaug:
        N: 0
        M: 0
network:
    arch: ViT-B/16
    init: True
    drop_out: 0.0
    emb_dropout: 0.0
    partial_bn: False
    version: ''
    bn_momentum: 0.1
    consensus_type: avg
    type: clip_ucf
    sim_header: 'Transf'
    fix_text: False
    fix_img: False
    describe:
solver:
    type: cosine
    epochs: 30
    start_epoch: 0
    epoch_offset: 0
    optim: adamw
    lr: 5.e-6
    lr_warmup_step: 3
    momentum: 0.9
    weight_decay: 0.2
    lr_decay_step: 10
    lr_decay_factor: 0.1
    clip_gradient: 20
    loss_type: nll
    evaluate: False
    ratio: 1
    f_ratio: 10
    r_actloss: 1
logging:
    print_freq: 10
    eval_freq: 1
