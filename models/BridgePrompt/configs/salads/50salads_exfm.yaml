pretrain: "./exp/clip_ucf/ViT-B/16/salads/last_model.pt"   # your fine-tuned checkpoint
seed: 1024
data:
    dataset: salads
    modality: RGB
    num_frames: 32
    seg_length: 1
    split: 1
    batch_size: 32
    workers: 4
    num_classes: 12
    index_bias: 1
    input_size: 224
    save_dir: '../../data/50Salads/brp_raw'   # writes directly into the project data dir
    randaug:
        N: 0
        M: 0
network:
    arch: ViT-B/16
    init: True
    drop_out: 0.0
    emb_dropout: 0.0
    if_proj: False
    partial_bn: False
    version: ''
    bn_momentum: 0.1
    consensus_type: avg
    type: clip_ucf
    sim_header: "Transf"
    fix_text: False
    fix_img: False
logging:
    print_freq: 10
    eval_freq: 1
